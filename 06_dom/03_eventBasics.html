<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DOM Part 4: Event Propagation & Delegation Master Notes</title>
    <style>
        :root {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
            --accent-orange: #ff9800;
            --accent-blue: #2196f3;
            --border-color: #333333;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 2rem;
            line-height: 1.6;
        }

        .note-container {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        h1, h2, h3 {
            color: var(--text-main);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        h2 { color: var(--accent-orange); }

        .interactive-zone {
            background: #252525;
            padding: 1.5rem;
            border-radius: 6px;
            border: 1px dashed #555;
        }

        .click-box {
            background: #3a3a3a;
            padding: 1rem;
            margin: 0.5rem 0;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="note-container" id="grandparent-wrapper">
        <h1>Event Propagation Engine Room</h1>
        
        <div class="interactive-zone" id="parent-container">
            <h3>Parent Grid Container</h3>
            
            <div class="click-box" data-item-id="alpha">Interactive Item Box Alpha</div>
            <div class="click-box" data-item-id="beta">Interactive Item Box Beta</div>
            <div class="click-box" data-item-id="gamma">Interactive Item Box Gamma</div>
        </div>
    </div>

    <script>
        // ============================================================================
        // SECTION 1: HIT-TESTING & COORDINATE GEOMETRY MAPPING (THE ENGINE BACKEND)
        // ============================================================================
        /*
          1. HOW TARGET DETECTION WORKS:
             - When a physical interaction happens (mouse click, touch screen tap), the 
               Operating System captures the hardware screen grid coordinates (e.g., X:150, Y:400).
             - The browser engine executes a "Coordinate Ray-Cast" projecting an imaginary vector
               straight down through its CSS rendering layout box models.
             - It looks for the absolute deepest, narrowest leaf-node HTML element that contains
               those physical pixel coordinates.
             
          2. THE INTENTION VS BOUNDARY LAW:
             - The browser engine completely ignores human intention; it operates strictly on physics.
             - If a pointer lands 1 pixel outside a button's boundary, the ray-cast flags the 
               parent container as the target. The button's direct listeners are completely bypassed.
             
          3. READ-ONLY PAYLOAD PROTECTION:
             - Once the leaf-node is discovered, the engine locks it into the event payload as `event.target`.
             - This target variable is a read-only heap memory pointer managed by the browser's 
               C++ engine core. JavaScript code cannot overwrite or alter it mid-flight.
        */

        // ============================================================================
        // SECTION 2: THE 3-PHASE EVENT LIFECYCLE TRACK PIPELINE
        // ============================================================================
        /*
          When an interaction target is locked, the browser shoots the event object along a fixed,
          three-phase continuous circuit track through the DOM branches:

          PHASE 1: THE CAPTURING PHASE (Trickle Down)
          - The event starts at the absolute topmost root structure (the global 'window' object).
          - It trickles vertically downward through the ancestral inheritance path 
            (window -> document -> html -> body -> parent-div) until it reaches the parent of the target.
          - CRITICAL MECHANIC: Standard .addEventListener() calls are completely blind to the event 
            on its downward journey. They let it pass by unhindered.

          PHASE 2: THE TARGET PHASE (Arrival)
          - The event arrives precisely at the deep leaf-node element object captured during Hit-Testing.
          - Listeners mounted directly onto this anchor element execute their code blocks now.

          PHASE 3: THE BUBBLING PHASE (Rise Up)
          - The event track flips direction completely. Like an air bubble in liquid, it shoots straight 
            back up the DOM parent branches, passing through every ancestor layer on its way out.
            (Target -> Parent Container -> Body -> Document -> Window).
          - CRITICAL MECHANIC: This is the exact phase where standard JavaScript listeners fire by default!
        */

        // ============================================================================
        // SECTION 3: TRAFFIC FLOW REGULATION AMMUNITION (FLOW MODIFIERS)
        // ============================================================================
        /*
          - event.target        : Direct read-only pointer to the literal node that triggered the physical hit.
          - event.currentTarget : Pointer to the element that is currently executing the running callback function.
          
          - event.stopPropagation(): Slams an absolute concrete wall down on the travel loop track. The event
                                     fully finishes running on the current element, but it is immediately 
                                     blocked from bubbling up to any higher parental structures.
                                     
          - event.preventDefault() : Instructs the engine to completely ignore its built-in, native tag actions 
                                     (e.g., blocking an <a> link from jumping pages, or preventing a <form> 
                                     from executing a hard page reload submit).
        */

        // ============================================================================
        // SECTION 4: ARCHITECTURAL DESIGN DESIGN PATTERN — EVENT DELEGATION
        // ============================================================================
        /*
          THE LEAKY LISTENER PITFALL:
          If you have an interface tracking 1,000 grid elements, looping through them to attach 
          1,000 individual .addEventListener() calls creates 1,000 closure blocks in your memory heap. 
          This consumes performance resource metrics and results in detached memory hazards if rows delete.

          THE SOLUTION: EVENT DELEGATION
          Instead of listening to the child nodes directly, exploit the Bubbling Phase! Mount exactly ONE
          master event listener wrapper onto their shared parent container node. 

          When any deep child item box is clicked, the event track naturally bubbles upward right into the parent.
          The parent intercepts it, uses guard statements to validate the layout context, and executes the code.
        */

        const masterParentContainer = document.getElementById("parent-container");

        // Event Delegation Pattern in Active Production Setup:
        masterParentContainer.addEventListener("click", function(event) {
            console.log("\n=== MASTER PARENT DELEGATION HANDLER BOOTED ===");
            console.log("Absolute Origin Trigger Source (event.target):", event.target);
            console.log("Current Context Executer (event.currentTarget):", event.currentTarget);

            // DEFENSIVE REMEDIATION (Target Snapping Magnet Pattern):
            // Using .closest() ensures that if a user hits the edge or a tiny interior text node, 
            // the engine automatically scales up the tree branch to lock onto the actual target structural card box.
            const verifiedTargetBox = event.target.closest(".click-box");
            
            // Guard Clause: If the user clicked outside the target boxes on raw blank parent padding, abort instantly.
            if (!verifiedTargetBox) {
                console.log("Ignored click context: Pointer did not land within an interactive box model zone.");
                return; 
            }

            // Read metadata cleanly from the snapped element node blueprint
            const itemId = verifiedTargetBox.getAttribute("data-item-id");
            console.log(`Routing Engine Processing Target ID Success: [${itemId}]`);
            
            // Mutate layout state dynamically
            verifiedTargetBox.style.backgroundColor = "var(--accent-blue)";
        });

        // DEMONSTRATING THE CAPTURING INTRUSION EXCEPTION:
        // Passing true (or { capture: true }) as the hidden third option changes the rules.
        // It tells the engine to wake this listener up during Phase 1 (On the way DOWN),
        // allowing this ancestor to run code BEFORE the target child node can even process the click!
        document.getElementById("grandparent-wrapper").addEventListener("click", function() {
            console.log("🚨 [CAPTURE INTRUSION LOG]: Grandparent intercepted event early during Phase 1.");
        }, { capture: true });
    </script>
</body>
</html>
