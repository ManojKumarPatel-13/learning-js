<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DOM Part 2: Traversal & Tree Relationships Master Notes</title>
    <style>
        :root {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
            --accent-purple: #9c27b0;
            --accent-cyan: #00bcd4;
            --accent-orange: #ff9800;
            --border-color: #333333;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 2rem;
            line-height: 1.6;
        }

        .note-container {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        h1, h2, h3 {
            color: var(--text-main);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        h2 { color: var(--accent-purple); }
    </style>
</head>
<body>

    <div class="note-container" id="family-tree-root">
        <h1 id="ancestor-title">Grandparent Container Layer</h1>
        
        <div id="parent-node">
            <p id="first-sibling">Elder Sibling Node (Index 0 Element)</p>
            <p id="target-node">Target Center Node (The Anchor Reference)</p>
            <p id="last-sibling">Younger Sibling Node (Index 2 Element)</p>
        </div>
    </div>

    <script>
        // ============================================================================
        // CHAPTER 1: THE DUALITY OF DOM TRAVERSAL ENGINES
        // ============================================================================
        /*
          The browser engine maps out the hierarchy of the page as a continuous graph.
          When shifting focus from a selected element to its neighbors, developers must choose
          between two completely distinct traversal engines depending on the performance need:

          1. ELEMENT-ONLY TRAVERSAL (The Layout Filter Engine):
             - Jumps exclusively from physical HTML markup tag to HTML markup tag.
             - Completely filters out and ignores whitespaces, enters, text nodes, and comments.
             - Pointers: .children, .parentElement, .firstElementChild, .lastElementChild, .nextElementSibling, .previousElementSibling

          2. RAW NODE TRAVERSAL (The Topological Tree Engine):
             - Maps out the absolute literal physical representation of the source document text.
             - Treats space entries, carriage returns, text snippets, and comment tags as full family nodes.
             - Pointers: .childNodes, .parentNode, .firstChild, .lastChild, .nextSibling, .previousSibling
        */

        const targetAnchor = document.getElementById("target-node");

        // ============================================================================
        // CHAPTER 2: HORIZONTAL TRAVERSAL NAVIGATION (SIBLINGS)
        // ============================================================================
        console.log("=== SIBLING NAVIGATION ARCHITECTURE ===");

        // --- Element-Only Horizon ---
        const nextElement = targetAnchor.nextElementSibling;
        const prevElement = targetAnchor.previousElementSibling;
        console.log("Clean Next Sibling Element ID:", nextElement.id); // Output: "last-sibling"
        console.log("Clean Prev Sibling Element ID:", prevElement.id); // Output: "first-sibling"

        // --- Raw Node Horizon ---
        // TRAP DETECTED: The immediate next physical node is the whitespace carriage return line break!
        const rawNextNode = targetAnchor.nextSibling; 
        console.log("Raw Next Sibling Node Type:", rawNextNode.nodeType); // Output: 3 (Text Node)
        console.log("Raw Next Sibling Node Value:", JSON.stringify(rawNextNode.nodeValue)); // Shows the "\n            " layout indentation

        // will learn about JSON.stringify later 
        // ============================================================================
        // CHAPTER 3: VERTICAL TRAVERSAL NAVIGATION (PARENT & CHILDREN)
        // ============================================================================
        console.log("\n=== VERTICAL NAVIGATION ENGINE ===");

        // Moving Upward:
        // .parentElement finds the direct parent HTML tag container wrapper block
        const parentDiv = targetAnchor.parentElement;
        console.log("Immediate Parent Container ID:", parentDiv.id); // Output: "parent-node"

        // Chaining Upward: Moving from target -> parent -> grandparent
        const grandParentNode = targetAnchor.parentElement.parentElement;
        console.log("Grandparent Level Container ID:", grandParentNode.id); // Output: "family-tree-root"

        // Moving Downward:
        console.log("Filtered Child Element Tags Array Count:", parentDiv.children.length); // Output: 3
        console.log("Raw Topological Child Nodes Count (Bloated):", parentDiv.childNodes.length); // Output: 7 (Includes enters and comments)


        // ============================================================================
        // CHAPTER 4: NODE TYPES CLASSIFICATION REFERENCE CHECKS
        // ============================================================================
        /*
          When walking the tree using raw node pointers, check the internal integer flags
          exposed by the .nodeType property to identify what object you are holding:
          
          - Type Flag 1 : Element Node (HTML tag wrapper)
          - Type Flag 3 : Text Node (Raw character data, tabs, or whitespace enters)
          - Type Flag 8 : Comment Node (In-line code comments kept by the browser)
        */
        console.log("\n=== NODE TYPE FLAG CLASSIFICATIONS ===");
        console.log("Target Anchor Element Node Type:", targetAnchor.nodeType); // Output: 1
        console.log("Whitespace text block Node Type:", targetAnchor.nextSibling.nodeType); // Output: 3


        // ============================================================================
        // CHAPTER 5: ADVANCED MEMORY TRAP — DETACHED DOM MEMORY LEAKS
        // ============================================================================
        /*
          ARCHITECTURAL HAZARD: THE DETACHED DOM NODE SPECIFICATION
          When you use a removal engine method (like parentDiv.removeChild(targetAnchor) or 
          targetAnchor.remove()) to discard an element from the web display screen, the browser
          engine detaches it from the structural DOM layout tree.

          CRITICAL PITFALL: If you still maintain an active global JavaScript variable reference 
          holding that element object (e.g., the 'targetAnchor' constant in this script context),
          the element cannot be garbage-collected! 

          It remains fully allocated inside your system's Heap Memory. Not only does the node
          itself leak, but the entire sub-tree linked underneath it is trapped in memory too.

          SANITIATION CLEANUP REMEDIATION PROTOCOL:
          Once an element is unmounted from the webpage layout, forcefully slice its memory
          bindings by reassigning variable pointers to 'null'. This clears the reference vector 
          and flags the node for the next Garbage Collection cycle sweep.
        */
        
        console.log("\n=== EXECUTION DETACHED DOM SAFETY SIMULATION ===");
        // Unmount the target element from the live document screen layout
        targetAnchor.remove(); 
        console.log("Node status check: Removed from DOM layout, but variable still alive in Heap!");
        console.log("Accessing detached node variable data content safely:", targetAnchor.id); // Works! Prints "target-node"

        // Forceful garbage-collection release protocol:
        let dynamicNodeReference = document.getElementById("first-sibling");
        dynamicNodeReference.remove(); // Drop from layout tree
        dynamicNodeReference = null;   // Wipes the heap pointer reference channel. Safe!
    </script>
</body>
</html>
