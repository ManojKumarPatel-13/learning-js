    <div class="note-container">
        <h1>Advanced Layout Observation Engines</h1>
        
        <div class="viewport-box" id="scroll-zone">
            <p>Scroll down inside the interface view or open the console to see the Observers in action.</p>
            <div style="height: 150px;"></div> <div class="observe-target" id="realtime-element">Target Element Node</div>
        </div>
    </div>

    <script>
        // ============================================================================
        // SECTION 1: THE INTERSECTION OBSERVER API (THE VISIBILITY TRACKER)
        // ============================================================================
        /*
          - Purpose: Programmatically watches an element node to see when it enters or 
                     exits the user's visible viewport screen frame.
          - Architectural Advantage: Legacy scroll tracking forced you to listen to massive,
                     high-frequency 'scroll' events that completely thrashed the main thread. 
                     IntersectionObserver runs asynchronously outside the main execution loop,
                     only waking up your code when thresholds are crossed.
          - Primary Use Cases: Infinite scrolling feeds, lazy-loading image configurations, 
                     and starting scroll-triggered animations.
        */
        
        const targetElement = document.getElementById("realtime-element");

        // Configuration Options:
        const intersectionOptions = {
            root: null,       // Defaults to the browser window screen viewport
            threshold: 0.5    // Triggers callback the millisecond 50% of the element is visible
        };

        // Engine Instantiation:
        const visibilityObserver = new IntersectionObserver(function(entries, observer) {
            entries.forEach(entry => {
                console.log("--- INTERSECTION OBSERVER INTERCEPT LOG ---");
                console.log("Is target node currently visible in viewport?:", entry.isIntersecting);
                console.log("Percentage of element currently visible:", entry.intersectionRatio);
                
                if (entry.isIntersecting) {
                    entry.target.style.backgroundColor = "#4caf50"; // Turn green when inside viewport
                } else {
                    entry.target.style.backgroundColor = "var(--accent-pink)"; // Reset when scrolled out
                }
            });
        }, intersectionOptions);

        // Arm the tracking scanner onto our selected DOM node pointer
        visibilityObserver.observe(targetElement);


        // ============================================================================
        // SECTION 2: THE MUTATION OBSERVER API (THE STRUCTURE INSPECTOR)
        // ============================================================================
        /*
          - Purpose: Watches a DOM target element node for any literal changes made to its 
                     internal structural topology or properties by running scripts.
          - Monitored Variables: Injections of new child elements, deletions of tags, modifications
                     to class attributes, or updates to internal text contents.
          - Primary Use Cases: Maintaining state synchronization in framework engines, writing 
                     secure browser plugin extensions, and monitoring third-party widget alterations.
        */

        // Engine Instantiation:
        const structureObserver = new MutationObserver(function(mutationsList, observer) {
            mutationsList.forEach(mutation => {
                console.log("--- MUTATION OBSERVER DETECTOR ACTIVE ---");
                console.log("Type of alteration performed on DOM node:", mutation.type);
                console.log("Modified attribute name identifier:", mutation.attributeName);
            });
        });

        // Arm the mutation scanner to track attribute mutations specifically
        structureObserver.observe(targetElement, { attributes: true });

        // Simulating a dynamic programmatic mutation after a 2-second timeout delay:
        setTimeout(() => {
            targetElement.setAttribute("data-system-status", "optimized-active");
        }, 2000);


        // ============================================================================
        // SECTION 3: THE RESIZE OBSERVER API (THE ELEMENT COMPONENT MEASURER)
        // ============================================================================
        /*
          - Purpose: Monitors the exact physical width and height dimensions of an individual 
                     element node inside the rendering box model.
          - Architectural Advantage: The legacy 'window.onresize' hook only let you track the 
                     global browser viewport size. ResizeObserver monitors the element itself. If 
                     a side menu expands and pushes a container narrower, the container reacts.
          - Primary Use Cases: Truly fluid component layout widgets independent of overall device screens.
        */

        // Engine Instantiation:
        const dimensionObserver = new ResizeObserver(function(entries) {
            for (let entry of entries) {
                console.log("--- RESIZE OBSERVER COMPONENT UPDATE ---");
                // Read content box width and height properties straight from browser layout engines
                console.log(`New Element Dimensions: ${entry.contentRect.width}px x ${entry.contentRect.height}px`);
            }
        });

        // Arm the dimension scanner onto the node pointer block
        dimensionObserver.observe(targetElement);


        // ============================================================================
        // SECTION 4: THE PERFORMANCE OBSERVER API (THE SYSTEM METRIC TRACKER)
        // ============================================================================
        /*
          - Purpose: Modern browser API that monitors real-time performance entry types 
                     (like layout shifts, long-running script blocks, and user interaction delays).
          - Architectural Advantage: Allows applications to collect real, live user performance data
                     directly from real devices rather than synthetic local test benchmarks.
          - Primary Use Cases: Tracking Core Web Vitals (CLS - Cumulative Layout Shift, INP - 
                     Interaction to Next Paint) to log framework efficiency metrics.
        */
        try {
            const perfObserver = new PerformanceObserver((list) => {
                list.getEntries().forEach((entry) => {
                    console.log("--- PERFORMANCE METRICS ENTRY RECORDED ---");
                    console.log(`Metric Name: ${entry.name} | Delay/Duration: ${entry.duration}ms`);
                });
            });
            // Arm it to specifically watch for long-running user interaction tasks
            perfObserver.observe({ type: "first-input", buffered: true });
        } catch (e) {
            console.log("PerformanceObserver configuration skipped or unsupported in this sandboxed context.");
        }
