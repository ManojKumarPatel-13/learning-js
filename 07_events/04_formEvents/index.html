<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Mastery File 4: Form Data Monitor</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90vh;
            margin: 0;
        }
        .form-card {
            background: #1e1e1e;
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid #333;
            width: 380px;
        }
        .input-group {
            margin-bottom: 1.25rem;
            display: flex;
            flex-direction: column;
        }
        label {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 0.5rem;
        }
        input {
            background: #111;
            border: 1px solid #444;
            padding: 0.75rem;
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #00bcd4;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: #4caf50;
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        button:hover { background: #45a049; }
    </style>
</head>
<body>

    <div class="form-card">
        <h2 style="margin-top:0;">Account Creation</h2>
        
        <form id="registration-form">
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter custom profile handle">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password-input" name="password" placeholder="Minimum 8 characters">
            </div>
            <button type="submit">Register Platform Account</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
