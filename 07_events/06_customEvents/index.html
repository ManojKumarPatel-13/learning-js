<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Mastery File 6: Custom Event Sandbox</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: sans-serif;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header-nav {
            width: 100%;
            max-width: 500px;
            background: #1e1e1e;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .cart-badge {
            background: #e91e63;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85rem;
        }
        .product-card {
            background: #1a1a1a;
            border: 1px solid #222;
            padding: 1.5rem;
            border-radius: 8px;
            width: 250px;
            text-align: center;
        }
        button {
            background: #00bcd4;
            color: black;
            border: none;
            padding: 0.75rem 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 1rem;
            width: 100%;
        }
        button:hover { background: #00acc1; }
    </style>
</head>
<body>

    <div class="header-nav">
        <strong>⚡ Dev Store</strong>
        <div class="cart-badge" id="cart-display">Basket: 0 items</div>
    </div>

    <div class="product-card">
        <h3 style="margin:0;">Pro Gaming Mouse</h3>
        <p style="color: #888; font-size: 0.9rem;">High precision layout optics</p>
        <button id="buy-btn">Add To Cart</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
