<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech-Scroll Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="brand">
                <span class="pulse-dot"></span>
                <h2>TechTerminal</h2>
            </div>
            <nav class="channel-nav">
                <button class="nav-btn active" data-channel="all">📡 all-streams</button>
                <button class="nav-btn" data-channel="articles">📚 dev-articles</button>
                <button class="nav-btn" data-channel="memes">🎭 tech-memes</button>
                <button class="nav-btn" data-channel="news">📰 industry-news</button>
            </nav>
            <div class="system-status">
                <p>Status: <span class="text-green">ONLINE</span></p>
                <p>Cache Memory: <span id="nodeCount">0 nodes</span></p>
            </div>
        </aside>

        <main class="feed-area">
            <header class="feed-header">
                <h1># main-feed</h1>
                <p>Curated technical learning, real-time news, and engineering culture.</p>
            </header>

            <div id="mediaFeed" class="feed-container">
                </div>

            <div id="scrollSentinel" class="sentinel-box">
                <div class="spinner"></div>
                <p>Scanning viewport bounds for next stream packet...</p>
            </div>
        </main>
    </div>

    <div id="mediaModal" class="modal-overlay hidden">
        <div class="modal-content">
            <button id="closeModal" class="close-btn">✕ Close Terminal</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
