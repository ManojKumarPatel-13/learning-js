<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reactive Engine Sandbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="app-container" id="app">
        <header class="app-header">
            <h1>Engine Core V3</h1>
            <p>Two-Way Data Binding Sandbox</p>
        </header>

        <section class="control-panel">
            <h2>Interactive View (Inputs)</h2>
            
            <div class="input-group">
                <label for="username-input">Profile Name:</label>
                <input type="text" id="username-input" v-model="username" placeholder="Type name...">
            </div>

            <div class="input-group">
                <label for="status-input">System Status Message:</label>
                <input type="text" id="status-input" v-model="systemStatus" placeholder="Type status...">
            </div>
        </section>

        <section class="display-panel">
            <h2>Rendered Output (Data-to-View)</h2>
            
            <div class="output-row">
                <span class="label">Username Asset:</span>
                <strong class="highlight" v-bind="username">Loading...</strong>
            </div>

            <div class="output-row">
                <span class="label">Status Asset:</span>
                <span class="text-bubble" v-bind="systemStatus">Loading...</span>
            </div>
        </section>

        <section class="trigger-panel">
            <h2>Framework Boundary Diagnostics</h2>
            <p>Simulate instant high-frequency mutations to test the Batch Render Manager Scheduler Queue.</p>
            <button id="stress-test-btn" class="btn">Fire 1,000 Synchronous State Shifts</button>
        </section>
    </main>

    <script type="module" src="core/main.js"></script>
</body>
</html>
